name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      DEMO_MODE: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: CI-only make target
        run: make test

      - name: Use env placeholder
        run: echo "Mode is ${{ env.DEMO_MODE }}"
